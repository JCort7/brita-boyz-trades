<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brita Boyz – Doug’s Deal Factory</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>BRITA BOYZ</h1>
<h2>Doug’s Deal Factory</h2>

<button onclick="openForm()">Enter New Trade Proposal</button>

<div id="tradeForm" style="display:none; margin-top:20px;">
  <h3>New Trade</h3>

  <input id="give" placeholder="We Send (ex: Isaiah Pacheco)">
  <br><br>
  <input id="receive" placeholder="We Receive (ex: 2026 4th)">
  <br><br>

  <button onclick="submitTrade()">Submit Trade</button>
</div>

<hr>

<h2>Doug’s To Do</h2>
<div id="tradeList"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>

</body>
</html>
